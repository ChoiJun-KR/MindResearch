<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마음연구소 · 나를 알아가는 시간</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #FF6B6B; --primary-light: #FFE0E0;
      --secondary: #845EC2; --secondary-light: #EDE0FF;
      --teal: #00B4A2; --teal-light: #D0F5F2;
      --bg: #FFF9F5; --text: #2D2D2D; --text-muted: #888;
      --radius: 20px; --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    html, body { background: var(--bg); font-family: 'Nanum Gothic', sans-serif; color: var(--text); min-height: 100vh; }
    #app { max-width: 680px; margin: 0 auto; padding: 0 0 4rem; }

    /* HEADER */
    .site-header { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); border-radius: 0 0 32px 32px; padding: 2rem 1.5rem 2.5rem; text-align: center; color: white; margin-bottom: 2rem; transition: background 0.4s; }
    .site-header.purple { background: linear-gradient(135deg, #845EC2 0%, #B39CD0 100%); }
    .site-header.teal { background: linear-gradient(135deg, #00B4A2 0%, #00D4C0 100%); }
    .site-header .logo { font-size: 13px; font-weight: 700; letter-spacing: 3px; opacity: 0.85; margin-bottom: 0.5rem; text-transform: uppercase; }
    .site-header h1 { font-family: 'Gmarket Sans', sans-serif; font-size: 26px; font-weight: 700; line-height: 1.3; margin-bottom: 0.5rem; }
    .site-header p { font-size: 14px; opacity: 0.9; }
    .dot-row { display: flex; justify-content: center; gap: 6px; margin-top: 1.2rem; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s; }
    .dot.active { background: white; transform: scale(1.3); }
    .dot.done { background: rgba(255,255,255,0.7); }

    /* SURVEY LIST */
    #survey-list { padding: 0 1rem; }
    .section-title { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; margin-bottom: 1rem; }
    .survey-card { background: white; border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent; box-shadow: var(--shadow); }
    .survey-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,107,0.18); border-color: var(--primary-light); }
    .survey-card.purple-card:hover { box-shadow: 0 8px 32px rgba(132,94,194,0.18); border-color: var(--secondary-light); }
    .survey-card.teal-card:hover { box-shadow: 0 8px 32px rgba(0,180,162,0.18); border-color: var(--teal-light); }
    .survey-card.locked { cursor: default; opacity: 0.5; }
    .survey-card.locked:hover { transform: none; box-shadow: var(--shadow); border-color: transparent; }
    .survey-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .survey-icon.pink { background: #FFE0E0; }
    .survey-icon.purple-bg { background: var(--secondary-light); }
    .survey-icon.teal-bg { background: var(--teal-light); }
    .survey-icon.gray { background: #F0F0F0; }
    .survey-card-info { flex: 1; }
    .survey-card-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
    .survey-card-info p { font-size: 13px; color: var(--text-muted); }
    .survey-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-available { background: #FFE0E0; color: var(--primary); }
    .badge-available.purple { background: var(--secondary-light); color: var(--secondary); }
    .badge-available.teal { background: var(--teal-light); color: var(--teal); }
    .badge-coming { background: #F0F0F0; color: #aaa; }

    /* SURVEY SCREEN */
    #survey-screen { display: none; padding: 0 1rem; }
    .progress-bar-wrap { background: #FFE0E0; border-radius: 99px; height: 8px; margin-bottom: 0.5rem; overflow: hidden; }
    .progress-bar-wrap.purple { background: var(--secondary-light); }
    .progress-bar-wrap.teal { background: var(--teal-light); }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #FF6B6B, #FF8E53); border-radius: 99px; transition: width 0.4s ease; }
    .progress-bar-fill.purple { background: linear-gradient(90deg, #845EC2, #B39CD0); }
    .progress-bar-fill.teal { background: linear-gradient(90deg, #00B4A2, #00D4C0); }
    .progress-label { font-size: 12px; color: var(--text-muted); text-align: right; margin-bottom: 1.5rem; }
    .question-card { background: white; border-radius: var(--radius); padding: 1.75rem 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; animation: slideIn 0.35s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .q-number { font-size: 11px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin-bottom: 0.6rem; text-transform: uppercase; }
    .q-number.purple { color: var(--secondary); }
    .q-number.teal { color: var(--teal); }
    .q-text { font-size: 17px; font-weight: 700; line-height: 1.5; margin-bottom: 1.5rem; }

    /* 4점/5점 척도 옵션 */
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-btn { background: #FFF9F5; border: 2px solid #F0E8E0; border-radius: 14px; padding: 0.9rem 1.1rem; text-align: left; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; font-family: 'Nanum Gothic', sans-serif; font-size: 14px; line-height: 1.5; color: var(--text); }
    .option-btn:hover { border-color: var(--primary); background: #FFF0F0; transform: translateX(4px); }
    .option-btn.selected { border-color: var(--primary); background: #FFE0E0; color: #CC3333; transform: translateX(4px); }
    .option-btn.teal-opt:hover { border-color: var(--teal); background: #E8FFFE; transform: translateX(4px); }
    .option-btn.teal-opt.selected { border-color: var(--teal); background: var(--teal-light); color: #006B62; transform: translateX(4px); }
    .option-score { font-weight: 700; font-size: 15px; min-width: 20px; color: var(--primary); opacity: 0.55; margin-top: 1px; }
    .option-btn.selected .option-score { opacity: 1; }
    .option-btn.teal-opt .option-score { color: var(--teal); }

    /* A/B 옵션 */
    .ab-options { display: flex; flex-direction: column; gap: 12px; }
    .ab-btn { background: #FAFAFA; border: 2px solid #EAEAEA; border-radius: 14px; padding: 1rem 1.2rem; text-align: left; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 12px; font-family: 'Nanum Gothic', sans-serif; font-size: 14px; line-height: 1.6; color: var(--text); }
    .ab-btn:hover { border-color: var(--secondary); background: #F5F0FF; transform: translateX(4px); }
    .ab-btn.selected { border-color: var(--secondary); background: var(--secondary-light); color: #5a3d8a; transform: translateX(4px); }
    .ab-label { font-weight: 800; font-size: 16px; color: var(--secondary); opacity: 0.45; flex-shrink: 0; margin-top: 1px; min-width: 18px; }
    .ab-btn.selected .ab-label { opacity: 1; }

    .hint-text { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: -0.5rem; margin-bottom: 0.5rem; opacity: 0.8; }
    .btn-back { padding: 0.9rem 1.4rem; border-radius: 14px; font-family: 'Nanum Gothic', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: 2px solid; background: white; border-color: #E0D8D0; color: var(--text-muted); }
    .btn-back:hover { border-color: #aaa; color: var(--text); }

    /* RESULT */
    #result-screen { display: none; padding: 0 1rem; }
    .result-hero { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); border-radius: 28px; padding: 2rem 1.5rem; text-align: center; color: white; margin-bottom: 1.25rem; position: relative; overflow: hidden; }
    .result-hero.purple { background: linear-gradient(135deg, #845EC2 0%, #B39CD0 100%); }
    .result-hero.teal { background: linear-gradient(135deg, #00B4A2 0%, #00D4C0 100%); }
    .result-hero::before { content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.1); top: -60px; right: -60px; }
    .result-hero::after { content: ''; position: absolute; width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.07); bottom: -50px; left: -40px; }
    .result-emoji { font-size: 52px; margin-bottom: 0.5rem; }
    .result-score-label { font-size: 12px; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
    .result-score { font-family: 'Gmarket Sans', sans-serif; font-size: 52px; font-weight: 700; line-height: 1; margin: 0.2rem 0; }
    .result-score span { font-size: 20px; opacity: 0.8; }
    .result-level { font-size: 18px; font-weight: 700; margin-top: 0.5rem; }
    .result-sublevel { font-size: 13px; opacity: 0.85; margin-top: 0.3rem; }
    .result-keywords { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 0.8rem; }
    .result-kw { background: rgba(255,255,255,0.2); border-radius: 99px; padding: 3px 10px; font-size: 12px; font-weight: 700; }

    .result-card { background: white; border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
    .result-card h3 { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; margin-bottom: 1rem; }
    .result-card h3.purple { color: var(--secondary); }
    .result-card h3.teal { color: var(--teal); }
    .result-quote { font-size: 15px; font-weight: 700; line-height: 1.6; color: #333; background: #FFF5F5; border-left: 3px solid var(--primary); padding: 1rem 1.2rem; border-radius: 0 12px 12px 0; margin-bottom: 1rem; }
    .result-quote.purple { background: #F5F0FF; border-left-color: var(--secondary); }
    .result-quote.teal { background: #E8FFFE; border-left-color: var(--teal); }
    .result-traits { display: flex; flex-direction: column; gap: 8px; }
    .trait-item { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; line-height: 1.5; color: #555; }
    .trait-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 6px; }
    .trait-dot.purple { background: var(--secondary); }
    .trait-dot.teal { background: var(--teal); }

    .coaching-card { background: linear-gradient(135deg, #FFF9F5 0%, #FFF0E8 100%); border-radius: var(--radius); padding: 1.5rem; border: 2px solid #FFE0D0; margin-bottom: 1rem; }
    .coaching-card.purple { background: linear-gradient(135deg, #F8F5FF 0%, #EDE0FF 100%); border-color: #D4BBFF; }
    .coaching-card.teal { background: linear-gradient(135deg, #F0FFFE 0%, #D0F5F2 100%); border-color: #A0E8E2; }
    .coaching-card h3 { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #FF8E53; text-transform: uppercase; margin-bottom: 1rem; }
    .coaching-card.purple h3 { color: var(--secondary); }
    .coaching-card.teal h3 { color: var(--teal); }
    .coaching-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.6; color: #555; align-items: flex-start; }
    .coaching-num { background: #FF8E53; color: white; font-weight: 700; font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .coaching-num.purple { background: var(--secondary); }
    .coaching-num.teal { background: var(--teal); }

    /* 애착유형 전용: 유형 점수 그리드 */
    .attach-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0; }
    .attach-score-item { background: #FAFAFA; border-radius: 14px; padding: 0.9rem 1rem; border: 2px solid #EAEAEA; }
    .attach-score-item.dominant { border-color: var(--teal); background: var(--teal-light); }
    .attach-score-name { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
    .attach-score-item.dominant .attach-score-name { color: var(--teal); }
    .attach-score-bar-bg { background: #E0E0E0; border-radius: 99px; height: 6px; margin-bottom: 4px; overflow: hidden; }
    .attach-score-bar-fg { height: 100%; border-radius: 99px; background: #ccc; transition: width 0.8s ease; }
    .attach-score-item.dominant .attach-score-bar-fg { background: linear-gradient(90deg, #00B4A2, #00D4C0); }
    .attach-score-val { font-size: 13px; font-weight: 700; color: #888; }
    .attach-score-item.dominant .attach-score-val { color: var(--teal); }

    .remember-card { background: #F8F8F8; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; border: 2px solid #EBEBEB; }
    .remember-card h3 { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 0.8rem; }
    .remember-card p { font-size: 13px; line-height: 1.9; color: #666; }

    .action-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .btn-share, .btn-retry { flex: 1; padding: 1rem; border-radius: 14px; font-family: 'Nanum Gothic', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: 2px solid; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-share { background: linear-gradient(135deg, #FF6B6B, #FF8E53); border-color: transparent; color: white; }
    .btn-share.purple { background: linear-gradient(135deg, #845EC2, #B39CD0); }
    .btn-share.teal { background: linear-gradient(135deg, #00B4A2, #00D4C0); }
    .btn-share:hover { opacity: 0.9; }
    .btn-retry { background: white; border-color: #E0D8D0; color: var(--text-muted); }
    .btn-retry:hover { border-color: var(--primary); color: var(--primary); }
    .more-surveys-section { margin-top: 2rem; }

    .score-bar-wrap { margin: 1rem 0; }
    .score-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .score-bar-bg { background: #F0E8E0; border-radius: 99px; height: 12px; overflow: hidden; }
    .score-bar-bg.purple { background: #EDE0FF; }
    .score-bar-bg.teal { background: var(--teal-light); }
    .score-bar-fg { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #FF6B6B, #FF8E53); transition: width 1s ease; }
    .score-bar-fg.purple { background: linear-gradient(90deg, #845EC2, #B39CD0); }
    .score-bar-fg.teal { background: linear-gradient(90deg, #00B4A2, #00D4C0); }
    .score-zones { display: flex; gap: 4px; margin-top: 8px; }
    .zone { flex: 1; text-align: center; font-size: 10px; padding: 4px 2px; border-radius: 6px; font-weight: 700; opacity: 0.6; transition: all 0.3s; white-space: pre; line-height: 1.4; }
    .zone.active { opacity: 1; transform: scale(1.05); }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: white; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 700; transition: transform 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    .share-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .share-modal { background: white; border-radius: 20px; padding: 1.5rem; max-width: 400px; width: 100%; }
    .share-modal p { font-weight: 700; font-size: 15px; margin-bottom: 1rem; }
    .share-modal textarea { width: 100%; height: 160px; border: 2px solid #FFE0E0; border-radius: 12px; padding: 0.8rem; font-size: 13px; resize: none; font-family: 'Nanum Gothic', sans-serif; line-height: 1.6; }
    .share-modal button { margin-top: 1rem; width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Nanum Gothic', sans-serif; }
  </style>
</head>
<body>
<div id="app">
  <div class="site-header" id="site-header">
    <div class="logo">🏫 마음연구소</div>
    <h1 id="header-title">나를 알아가는 시간 ✨</h1>
    <p id="header-sub">가볍게, 재밌게, 나 자신을 탐색해봐요</p>
    <div class="dot-row" id="step-dots"></div>
  </div>

  <div id="survey-list">
    <div class="section-title">📋 설문 목록</div>
    <div class="survey-card" onclick="startSurvey(0)">
      <div class="survey-icon pink">🪞</div>
      <div class="survey-card-info"><h3>자존감 척도 테스트</h3><p>나는 나 자신을 얼마나 인정하고 있을까? · 10문항</p></div>
      <span class="survey-badge badge-available">시작하기</span>
    </div>
    <div class="survey-card purple-card" onclick="startSurvey(1)">
      <div class="survey-icon purple-bg">🌀</div>
      <div class="survey-card-info"><h3>나르시시즘 성향 테스트</h3><p>내 안의 자기애 성향, 어느 정도일까? · 40문항</p></div>
      <span class="survey-badge badge-available purple">시작하기</span>
    </div>
    <div class="survey-card teal-card" onclick="startSurvey(2)">
      <div class="survey-icon teal-bg">💞</div>
      <div class="survey-card-info"><h3>연애 애착 유형 검사</h3><p>내 연애 패턴, 어떤 애착 유형일까? · 16문항</p></div>
      <span class="survey-badge badge-available teal">시작하기</span>
    </div>
  </div>

  <div id="survey-screen">
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div id="options-container"></div>
    </div>
    <p class="hint-text">선택하면 자동으로 다음 문항으로 넘어가요</p>
    <button class="btn-back" id="btn-back" onclick="goBack()">◀ 이전으로</button>
  </div>

  <div id="result-screen">
    <div class="result-hero" id="result-hero">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-score-label" id="res-score-label">내 점수</div>
      <div class="result-score" id="res-score"></div>
      <div class="result-level" id="res-level"></div>
      <div class="result-sublevel" id="res-sublevel"></div>
      <div class="result-keywords" id="res-keywords"></div>
    </div>

    <div class="result-card" id="res-dist-card">
      <h3 id="res-dist-title">📊 점수 분포</h3>
      <div id="res-dist-body"></div>
    </div>

    <div class="result-card">
      <h3 id="res-summary-title">💬 유형 특징</h3>
      <div class="result-quote" id="res-quote"></div>
      <div class="result-traits" id="res-traits"></div>
    </div>

    <div class="coaching-card" id="res-coaching-card">
      <h3 id="res-coaching-title">🌱 코칭 메시지</h3>
      <div id="res-coaching"></div>
    </div>

    <div class="remember-card" id="res-remember-card" style="display:none;">
      <h3>📌 꼭 기억할 점</h3>
      <p id="res-remember-text"></p>
    </div>

    <div class="action-row">
      <button class="btn-share" id="btn-share" onclick="shareResult()">📤 결과 공유하기</button>
      <button class="btn-retry" onclick="retryAll()">🔄 다시 하기</button>
    </div>

    <div class="more-surveys-section">
      <div class="section-title">📋 다른 설문도 해볼까요?</div>
      <div id="more-survey-list"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const SITE_URL = 'https://choijun-kr.github.io/MindResearch/';

/* ===================== SURVEY 0: 자존감 척도 ===================== */
const survey0 = {
  id:0, title:'자존감 척도 테스트', emoji:'🪞', color:'red', type:'scale',

const surveys = [survey0, survey1, survey2];
let currentSurvey=null, currentQ=0, answers=[], transitioning=false;

/* ===================== 시작 ===================== */
function startSurvey(idx) {
  currentSurvey=surveys[idx]; currentQ=0; answers=[]; transitioning=false;
  const c=currentSurvey.color;
  document.getElementById('site-header').className='site-header'+(c==='purple'?' purple':c==='teal'?' teal':'');
  document.getElementById('header-title').textContent=currentSurvey.title;
  document.getElementById('header-sub').textContent='총 '+currentSurvey.questions.length+'문항 · 선택하면 자동으로 넘어가요';
  document.getElementById('survey-list').style.display='none';
  document.getElementById('survey-screen').style.display='block';
  document.getElementById('progress-wrap').className='progress-bar-wrap'+(c==='purple'?' purple':c==='teal'?' teal':'');
  document.getElementById('progress-fill').className='progress-bar-fill'+(c==='purple'?' purple':c==='teal'?' teal':'');
  renderQuestion();
}

function updateDots(total) {
  const dots=document.getElementById('step-dots'); dots.innerHTML='';
  const maxDots=10, step=total<=maxDots?1:Math.ceil(total/maxDots);
  for(let i=0;i<total;i+=step){
    const d=document.createElement('div');
    const end=Math.min(i+step-1,total-1);
    d.className='dot'+(currentQ>=i&&currentQ<=end?' active':currentQ>end?' done':'');
    dots.appendChild(d);
  }
}

function renderQuestion() {
  transitioning=false;
  const q=currentSurvey.questions[currentQ], total=currentSurvey.questions.length, c=currentSurvey.color;
  updateDots(total);
  document.getElementById('progress-fill').style.width=(currentQ/total*100)+'%';
  document.getElementById('progress-label').textContent=currentQ+' / '+total+' 완료';
  const qn=document.getElementById('q-number');
  qn.textContent='Q'+(currentQ+1); qn.className='q-number'+(c==='purple'?' purple':c==='teal'?' teal':'');
  document.getElementById('q-text').textContent=q.text;
  const container=document.getElementById('options-container'); container.innerHTML='';

  if(currentSurvey.type==='ab'){
    const list=document.createElement('div'); list.className='ab-options';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='ab-btn'+(answers['q'+currentQ+'_label']===opt.label?' selected':'');
      btn.innerHTML='<span class="ab-label">'+opt.label+'</span><span>'+opt.text+'</span>';
      btn.onclick=()=>selectAB(opt.score,opt.label,btn);
      list.appendChild(btn);
    });
    container.appendChild(list);
  } else {
    // scale & attach 모두 동일한 옵션 UI
    const list=document.createElement('div'); list.className='options-list';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      const isTeal=c==='teal';
      const sel=answers[currentQ]===opt.score;
      btn.className='option-btn'+(isTeal?' teal-opt':'')+(sel?' selected':'');
      btn.innerHTML='<span class="option-score">'+opt.score+'</span><span>'+opt.text+'</span>';
      btn.onclick=()=>selectScale(opt.score,btn);
      list.appendChild(btn);
    });
    container.appendChild(list);
  }
  document.getElementById('btn-back').style.display=currentQ===0?'none':'';
  const card=document.getElementById('question-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='';
}

function selectScale(score,btn){
  if(transitioning)return;
  answers[currentQ]=score;
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); transitioning=true; setTimeout(goNext,320);
}
function selectAB(score,label,btn){
  if(transitioning)return;
  answers[currentQ]=score; answers['q'+currentQ+'_label']=label;
  document.querySelectorAll('.ab-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); transitioning=true; setTimeout(goNext,320);
}
function goNext(){ if(currentQ===currentSurvey.questions.length-1)showResult(); else{currentQ++;renderQuestion();} }
function goBack(){ if(currentQ>0){currentQ--;renderQuestion();} }

/* ===================== 결과 ===================== */
function showResult(){
  document.getElementById('survey-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  document.getElementById('step-dots').innerHTML='';
  const c=currentSurvey.color, isPurple=c==='purple', isTeal=c==='teal';
  const clsAdd=isPurple?' purple':isTeal?' teal':'';

  /* 점수 계산 */
  let score=0;
  for(let i=0;i<currentSurvey.questions.length;i++) if(typeof answers[i]==='number') score+=answers[i];

  /* 애착 유형 전용 계산 */
  let attachScores=null, profile=null, isMixed=false, mixedProfile=null;
  if(currentSurvey.type==='attach'){
    const qs=currentSurvey.questions;
    const groups={secure:[],anxious:[],avoidant:[],disorganized:[]};
    qs.forEach((q,i)=>{ if(typeof answers[i]==='number') groups[q.group].push(answers[i]); });
    attachScores={};
    Object.keys(groups).forEach(k=>{ attachScores[k]=groups[k].length?groups[k].reduce((a,b)=>a+b,0)/groups[k].length:1; });
    /* 혼합형 체크 */
    for(const mp of currentSurvey.mixedProfiles){ if(mp.cond(attachScores)){isMixed=true;mixedProfile=mp;break;} }
    /* 주 유형 */
    const dominant=Object.keys(attachScores).reduce((a,b)=>attachScores[a]>=attachScores[b]?a:b);
    profile=currentSurvey.attachProfiles[dominant];
    profile._dominant=dominant;
    score=null;
  } else {
    profile=currentSurvey.profiles.find(p=>score>=p.range[0]&&score<=p.range[1]);
  }

  window._lastScore=score; window._lastProfile=profile; window._lastAttachScores=attachScores;
  window._isMixed=isMixed; window._mixedProfile=mixedProfile;

  /* 헤더 */
  document.getElementById('result-hero').className='result-hero'+clsAdd;
  const displayProfile=isMixed?mixedProfile:profile;
  document.getElementById('res-emoji').textContent=displayProfile.emoji;
  document.getElementById('res-score-label').textContent=isTeal&&attachScores?'내 주 애착 유형':'내 점수';

  if(isTeal&&attachScores){
    document.getElementById('res-score').innerHTML=displayProfile.name;
    document.getElementById('res-score').style.fontSize='28px';
  } else {
    document.getElementById('res-score').style.fontSize='';
    document.getElementById('res-score').innerHTML=score+'<span> / '+currentSurvey.barMax+'</span>';
  }
  document.getElementById('res-level').textContent=isMixed?mixedProfile.name:(isTeal?displayProfile.summary:profile.level);
  document.getElementById('res-sublevel').textContent=isMixed?mixedProfile.summary:(profile.sublevel||'');

  /* 키워드 */
  const kwEl=document.getElementById('res-keywords'); kwEl.innerHTML='';
  const kws=isMixed?mixedProfile.keywords:(profile.keywords||[]);
  kws.forEach(k=>{ const s=document.createElement('span'); s.className='result-kw'; s.textContent=k; kwEl.appendChild(s); });

  /* 분포 */
  document.getElementById('res-dist-title').className=clsAdd.trim();
  const distBody=document.getElementById('res-dist-body'); distBody.innerHTML='';
  if(isTeal&&attachScores){
    document.getElementById('res-dist-title').textContent='📊 유형별 점수';
    const grid=document.createElement('div'); grid.className='attach-scores';
    const labels={secure:'💚 안정',anxious:'💛 불안',avoidant:'💙 회피',disorganized:'🩶 혼란'};
    Object.keys(attachScores).forEach(k=>{
      const val=attachScores[k], isDom=k===profile._dominant;
      const item=document.createElement('div');
      item.className='attach-score-item'+(isDom?' dominant':'');
      const pct=((val-1)/3)*100;
      item.innerHTML='<div class="attach-score-name">'+labels[k]+'</div>'
        +'<div class="attach-score-bar-bg"><div class="attach-score-bar-fg" style="width:0%" data-pct="'+pct+'"></div></div>'
        +'<div class="attach-score-val">'+val.toFixed(1)+' / 4.0</div>';
      grid.appendChild(item);
    });
    distBody.appendChild(grid);
    setTimeout(()=>{ document.querySelectorAll('.attach-score-bar-fg').forEach(el=>{ el.style.width=el.dataset.pct+'%'; }); },100);
  } else {
    document.getElementById('res-dist-title').textContent='📊 점수 분포';
    const barBg=document.createElement('div'); barBg.className='score-bar-wrap';
    const pct=((score-currentSurvey.barMin)/(currentSurvey.barMax-currentSurvey.barMin))*100;
    barBg.innerHTML='<div class="score-bar-labels"><span>'+currentSurvey.barMin+'점</span><span>'+currentSurvey.barMax+'점</span></div>'
      +'<div class="score-bar-bg'+clsAdd+'"><div class="score-bar-fg'+clsAdd+'" id="score-bar" style="width:0%"></div></div>';
    distBody.appendChild(barBg);
    const zonesEl=document.createElement('div'); zonesEl.className='score-zones';
    currentSurvey.zones.forEach((z,i)=>{
      const div=document.createElement('div');
      div.className='zone'+(i===profile.zoneIdx?' active':'');
      div.style.background=z.bg; div.style.color=z.color; div.textContent=z.label;
      zonesEl.appendChild(div);
    });
    distBody.appendChild(zonesEl);
    setTimeout(()=>{ document.getElementById('score-bar').style.width=Math.max(3,pct)+'%'; },100);
  }

  /* 요약 */
  document.getElementById('res-summary-title').className=clsAdd.trim();
  document.getElementById('res-summary-title').textContent='💬 유형 특징';
  const quote=document.getElementById('res-quote');
  quote.className='result-quote'+clsAdd;
  if(isTeal){
    quote.textContent=isMixed?mixedProfile.summary:profile.summary;
    if(!isMixed&&profile.note){ quote.textContent+=' · 주의: '+profile.note; }
  } else {
    quote.textContent=profile.quote;
  }

  const traitsEl=document.getElementById('res-traits'); traitsEl.innerHTML='';
  const traitList=isMixed?mixedProfile.traits:profile.traits;
  traitList.forEach(t=>{
    traitsEl.innerHTML+='<div class="trait-item"><div class="trait-dot'+clsAdd+'"></div><span>'+t+'</span></div>';
  });

  /* 코칭 */
  const coachCard=document.getElementById('res-coaching-card');
  coachCard.className='coaching-card'+clsAdd;
  const coachTitle=document.getElementById('res-coaching-title');
  coachTitle.className=clsAdd.trim();
  coachTitle.textContent=isTeal?'💌 연애 팁':'🌱 성장 가이드';
  const coachEl=document.getElementById('res-coaching'); coachEl.innerHTML='';
  const coachList=isMixed?mixedProfile.coaching:profile.coaching;
  coachList.forEach((c2,i)=>{
    coachEl.innerHTML+='<div class="coaching-item"><div class="coaching-num'+clsAdd+'">'+(i+1)+'</div><span>'+c2+'</span></div>';
  });

  /* 꼭기억 */
  const remCard=document.getElementById('res-remember-card');
  remCard.style.display=currentSurvey.showRemember?'':'none';
  if(currentSurvey.showRemember) document.getElementById('res-remember-text').textContent=currentSurvey.rememberText;

  /* 공유 버튼 */
  document.getElementById('btn-share').className='btn-share'+clsAdd;

  /* 더 보기 */
  const moreList=document.getElementById('more-survey-list'); moreList.innerHTML='';
  surveys.forEach((s,idx)=>{
    if(s.id===currentSurvey.id)return;
    const iconCls=s.color==='purple'?'purple-bg':s.color==='teal'?'teal-bg':'pink';
    const cardCls=s.color==='purple'?'purple-card':s.color==='teal'?'teal-card':'';
    const badgeCls=s.color==='purple'?'purple':s.color==='teal'?'teal':'';
    const card=document.createElement('div');
    card.className='survey-card'+( cardCls?' '+cardCls:'');
    card.onclick=()=>startSurvey(idx);
    card.innerHTML='<div class="survey-icon '+iconCls+'">'+s.emoji+'</div>'
      +'<div class="survey-card-info"><h3>'+s.title+'</h3><p>'+s.questions.length+'문항 · 지금 바로 해보세요!</p></div>'
      +'<span class="survey-badge badge-available'+(badgeCls?' '+badgeCls:'')+'">시작하기</span>';
    moreList.appendChild(card);
  });
}

/* ===================== 공유 ===================== */
function shareResult(){
  const score=window._lastScore, profile=window._lastProfile;
  const isMixed=window._isMixed, mp=window._mixedProfile;
  const displayP=isMixed?mp:profile;
  let text=currentSurvey.emoji+' '+currentSurvey.title+' 결과\n\n'
    +displayP.emoji+' '+displayP.name+'\n'
    +(isMixed?mp.summary:profile.summary||profile.quote||'')
    +'\n\n나도 해보기 → '+SITE_URL;
  if(score!==null) text=currentSurvey.emoji+' '+currentSurvey.title+' 결과\n\n'
    +displayP.emoji+' '+score+'점 / '+currentSurvey.barMax+'점\n'+profile.level
    +(profile.sublevel?'\n'+profile.sublevel:'')
    +'\n\n'+profile.quote+'\n\n나도 해보기 → '+SITE_URL;

  if(navigator.share){ navigator.share({title:currentSurvey.title+' 결과',text}).catch(()=>{}); }
  else if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(showToast).catch(()=>fallbackCopy(text)); }
  else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ const ok=document.execCommand('copy'); document.body.removeChild(ta); ok?showToast():showShareModal(text); }
  catch(e){ document.body.removeChild(ta); showShareModal(text); }
}
function showShareModal(text){
  const o=document.createElement('div'); o.className='share-modal-overlay';
  o.innerHTML='<div class="share-modal"><p>📋 아래 텍스트를 복사해서 공유하세요!</p><textarea readonly>'+text+'</textarea><button onclick="this.closest(\'.share-modal-overlay\').remove()">닫기</button></div>';
  document.body.appendChild(o); o.querySelector('textarea').select();
}
function showToast(){
  const t=document.getElementById('toast'); t.textContent='✅ 결과가 클립보드에 복사됐어요!';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}
function retryAll(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('survey-list').style.display='block';
  document.getElementById('site-header').className='site-header';
  document.getElementById('header-title').textContent='나를 알아가는 시간 ✨';
  document.getElementById('header-sub').textContent='가볍게, 재밌게, 나 자신을 탐색해봐요';
  document.getElementById('step-dots').innerHTML='';
}
</script>
